# ============================================================
# BestNotes — Netlify Configuration
# ============================================================

[build]
  # No build step needed — pure static site + Netlify Functions
  publish = "."
  functions = "netlify/functions"

# Redirect /api/* to functions for cleaner URLs (optional)
[[redirects]]
  from = "/api/create-order"
  to   = "/.netlify/functions/create-order"
  status = 200

[[redirects]]
  from = "/api/verify-payment"
  to   = "/.netlify/functions/verify-payment"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
